var results = [];

function log(m){var e=document.getElementById('log');e.textContent+=m+'\n';e.scrollTop=e.scrollHeight}
function st(i,m,muted){var e=document.getElementById('s'+(i+1));e.textContent=m;e.style.color=muted?'#6b6b6b':'#f0ede8'}
function bar(i,p){document.getElementById('b'+(i+1)).style.width=p+'%'}

async function callBatch(concepts){
  var res=await fetch('https://epistemic.live/api/curate-batch',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({concepts:concepts,collections:COLS})
  });
  var data=await res.json();
  if(data.error)throw new Error(data.error);
  return data.result;
}

async function run(){
  document.getElementById('runBtn').disabled=true;
  document.getElementById('runBtn').textContent='Running...';
  results=[];

  for(var i=0;i<BATCHES.length;i++){
    var batch=BATCHES[i];
    log('Batch '+(i+1)+' ('+batch.length+' concepts)...');
    st(i,'Calling API...');bar(i,15);
    try{
      var r=await callBatch(batch);
      var n=r.filter(function(c){return c.curated_collection_ids.length>0}).length;
      results=results.concat(r);
      st(i,'Done — '+n+'/'+r.length+' assigned');bar(i,100);
      log('Batch '+(i+1)+' done. '+n+'/'+r.length+' assigned.');
    }catch(e){
      st(i,'Error: '+e.message);
      log('Batch '+(i+1)+' error: '+e.message);
      document.getElementById('runBtn').disabled=false;
      document.getElementById('runBtn').textContent='Retry';
      return;
    }
  }

  var total=results.filter(function(c){return c.curated_collection_ids.length>0}).length;
  log('\nAll done. '+total+'/'+results.length+' concepts assigned to at least one collection.');
  log('\nCollection populations:');
  var tally={};
  COLS.forEach(function(c){tally[c.id]={title:c.title,count:0}});
  results.forEach(function(c){c.curated_collection_ids.forEach(function(id){if(tally[id])tally[id].count++})});
  COLS.forEach(function(c){log('  ['+c.id+'] '+c.title+': '+tally[c.id].count)});
  document.getElementById('dlBtn').style.display='inline-block';
  document.getElementById('runBtn').textContent='Complete';
}

function dl(){
  var blob=new Blob([JSON.stringify(results,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='curated_collection_ids_patch.json';a.click();
  URL.revokeObjectURL(url);
}
</script>
